<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

<h2>Products</h2>

{% for product in products %}
  <div>
    <h3>{{ product.name }}</h3>
    <p>Rs. {{ product.price }}</p>

    <!-- View Details -->
    <a href="/product/{{ product.id }}/">View Details</a>

    <!-- Add to Cart -->
    <a href="/add/{{ product.id }}/">Add to Cart</a>
  </div>
{% endfor %}

<br>
<a href="/cart/">Go to Cart</a>

</body>
</html>
