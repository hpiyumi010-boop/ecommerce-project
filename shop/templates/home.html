<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Shop</title>

    <!--  Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!--  Page Title -->
    <h1 class="text-center mb-4">My Shop</h1>
<a href="/" class="btn btn-dark mb-3">All Products</a>
    <!--  Categories Section -->
    <div class="mb-4">
        <h4>Categories</h4>

{% for cat in categories %}
    <a href="/?category={{ cat.id }}" class="btn btn-sm btn-outline-primary me-2 mb-2">
        {{ cat.name }}
    </a>
{% endfor %}
    </div>

    <!--  Products Section -->
    <div class="row">
    {% for product in products %}
    <div class="col-md-4">
        <div class="card mb-4 shadow-sm">

            {% if product.image %}
            <img src="{{ product.image.url }}" class="card-img-top">
            {% endif %}

<div class="card-body">
    <a href="/product/{{ product.id }}">
        <h5>{{ product.name }}</h5>
    </a>
    <p>Price: Rs. {{ product.price }}</p>

    <a href="/product/{{ product.id }}" class="btn btn-primary">
        View Details
    </a>
</div>

        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
